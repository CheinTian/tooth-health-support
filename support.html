<h1>技术支持</h1>

<h2>常见问题</h2>
<p><strong>Q: 数据会丢失吗？</strong><br>
A: 数据存储在手机本地。正常使用不会丢失。如遇迁移失败，旧数据会自动备份为 .backup 文件。</p>

<p><strong>Q: 换手机后如何迁移数据？</strong><br>
A: 使用 iPhone 的"快速开始"或 iCloud 备份恢复，数据会随应用一同迁移。</p>

<p><strong>Q: 桌面小组件时间不更新？</strong><br>
A: iOS 系统控制小组件刷新频率，最长可能需要几分钟。打开一次 App 可立即刷新。</p>
